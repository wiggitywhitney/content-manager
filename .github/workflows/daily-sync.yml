name: Daily Content Sync

on:
  # Manual trigger for testing
  workflow_dispatch:

  # Scheduled run daily at 16:15 UTC = 11:15am CDT / 10:15am CST, never before 10am
  schedule:
    - cron: '15 16 * * *'  # Run at 16:15 UTC, every day including weekends

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: npm run test:integration

  e2e-tests:
    needs: integration-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run e2e tests
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MICROBLOG_APP_TOKEN: ${{ secrets.MICROBLOG_APP_TOKEN }}
        run: npm run test:e2e

  daily-sync:
    needs: integration-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    concurrency:
      group: daily-sync-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      # yt-dlp is used by post-microblog.js (scanAndPostShorts) for the micro.blog view-count scan path.
      # Short post dispatch (post-social-content.js) no longer uses yt-dlp — it reads video files from Google Drive.
      - name: Set up yt-dlp
        continue-on-error: true
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Update yt-dlp to latest
        continue-on-error: true
        run: yt-dlp -U

      - name: Scan for new content
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node src/scan-new-content.js

      - name: Determine post priority
        id: priority
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          DAY=$(date +%-d)
          CAREER_FIRST=$((DAY % 2))
          echo "career_first=${CAREER_FIRST}" >> "$GITHUB_OUTPUT"
          if [ "$CAREER_FIRST" -eq 0 ]; then
            PROBE=$(node -e "const { fetchOldestPendingPost } = require('./src/social-posts-queue'); (async () => { try { const p = await fetchOldestPendingPost(); process.stdout.write(p ? 'pending' : 'empty'); } catch (e) { process.stderr.write(e.message); process.stdout.write('error'); process.exit(2); } })();")
            case "$PROBE" in
              pending) echo "social_has_pending=true" >> "$GITHUB_OUTPUT" ;;
              empty)   echo "social_has_pending=false" >> "$GITHUB_OUTPUT" ;;
              *)       echo "[priority] Failed to probe social queue: $PROBE"; exit 1 ;;
            esac
          else
            echo "social_has_pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync content to Micro.blog and update About page
        if: steps.priority.outputs.career_first == '1' || steps.priority.outputs.social_has_pending == 'false'
        env:
          DRY_RUN: 'false'  # Explicitly disable dry-run mode for production
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MICROBLOG_APP_TOKEN: ${{ secrets.MICROBLOG_APP_TOKEN }}
          MICROBLOG_XMLRPC_TOKEN: ${{ secrets.MICROBLOG_XMLRPC_TOKEN }}
          MICROBLOG_USERNAME: ${{ secrets.MICROBLOG_USERNAME }}
        run: node src/sync-content.js

      - name: Read LinkedIn credentials from GSM
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json --quiet
          LINKEDIN_ACCESS_TOKEN=$(gcloud secrets versions access latest --secret=linkedin_access_token --project=demoo-ooclock)
          LINKEDIN_TOKEN_EXPIRES_AT=$(gcloud secrets versions access latest --secret=linkedin_token_expires_at --project=demoo-ooclock)
          LINKEDIN_PERSON_URN=$(gcloud secrets versions access latest --secret=linkedin_person_urn --project=demoo-ooclock)
          echo "LINKEDIN_ACCESS_TOKEN=$LINKEDIN_ACCESS_TOKEN" >> "$GITHUB_ENV"
          echo "LINKEDIN_TOKEN_EXPIRES_AT=$LINKEDIN_TOKEN_EXPIRES_AT" >> "$GITHUB_ENV"
          echo "LINKEDIN_PERSON_URN=$LINKEDIN_PERSON_URN" >> "$GITHUB_ENV"
          rm /tmp/sa-key.json

      - name: Post social content
        env:
          CAREER_PRIORITY: ${{ steps.priority.outputs.career_first }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MICROBLOG_APP_TOKEN: ${{ secrets.MICROBLOG_APP_TOKEN }}
        run: node src/post-social-content.js

      - name: Update page visibility
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MICROBLOG_XMLRPC_TOKEN: ${{ secrets.MICROBLOG_XMLRPC_TOKEN }}
          MICROBLOG_USERNAME: ${{ secrets.MICROBLOG_USERNAME }}
        run: node src/update-page-visibility.js
