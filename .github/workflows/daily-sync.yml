name: Daily Content Sync

on:
  # Manual trigger for testing
  workflow_dispatch:

  # Two-post mode: morning slot at 13:00 UTC = 8am CDT / 7am CST (social priority)
  #                evening slot at 21:00 UTC = 4pm CDT / 3pm CST (career priority)
  # Single-post mode: only the morning cron posts; the evening run exits early via skip_run guard.
  schedule:
    - cron: '0 13 * * *'  # Morning slot: 8am CDT every day
    - cron: '0 21 * * *'  # Evening slot: 4pm CDT every day

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: npm run test:integration

  e2e-tests:
    needs: integration-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run e2e tests
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MICROBLOG_APP_TOKEN: ${{ secrets.MICROBLOG_APP_TOKEN }}
        run: npm run test:e2e

  daily-sync:
    needs: integration-tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    concurrency:
      group: daily-sync-${{ github.ref }}
      cancel-in-progress: true
    env:
      # Set to 'true' (default) to enable two-post-per-day mode (morning=social, evening=career).
      # Set to 'false' to restore one-post-per-day behavior — evening cron runs but skips posting.
      TWO_POSTS_PER_DAY: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      # yt-dlp is used by post-microblog.js (scanAndPostShorts) for the micro.blog view-count scan path.
      # Short post dispatch (post-social-content.js) no longer uses yt-dlp — it reads video files from Google Drive.
      - name: Set up yt-dlp
        continue-on-error: true
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Update yt-dlp to latest
        continue-on-error: true
        run: yt-dlp -U

      - name: Determine post priority
        id: priority
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          DAY=$(date +%-d)
          CAREER_FIRST=$((DAY % 2))
          echo "career_first=${CAREER_FIRST}" >> "$GITHUB_OUTPUT"

          # Slot detection: morning = UTC hour before 17 (covers 8am CDT cron at 13:00 UTC)
          #                 evening = UTC hour 17 or later (covers 4pm CDT cron at 21:00 UTC)
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 17 ]; then IS_MORNING=true; else IS_MORNING=false; fi
          echo "is_morning_slot=${IS_MORNING}" >> "$GITHUB_OUTPUT"

          # In single-post mode, skip evening cron runs to preserve one-post-per-day behavior
          if [ "${TWO_POSTS_PER_DAY}" != "true" ] && [ "$IS_MORNING" = "false" ]; then
            echo "skip_run=true" >> "$GITHUB_OUTPUT"
            echo "[priority] Evening run skipped — TWO_POSTS_PER_DAY is not enabled"
            exit 0
          fi
          echo "skip_run=false" >> "$GITHUB_OUTPUT"

          # Probe social queue — needed for two-post morning career fallback and single-post priority logic
          if [ "$CAREER_FIRST" -eq 0 ] || [ "${TWO_POSTS_PER_DAY}" = "true" ]; then
            PROBE=$(node -e "const { fetchOldestPendingPost } = require('./src/social-posts-queue'); (async () => { try { const p = await fetchOldestPendingPost(); process.stdout.write(p ? 'pending' : 'empty'); } catch (e) { process.stderr.write(e.message); process.stdout.write('error'); process.exit(2); } })();")
            case "$PROBE" in
              pending) echo "social_has_pending=true" >> "$GITHUB_OUTPUT" ;;
              empty)   echo "social_has_pending=false" >> "$GITHUB_OUTPUT" ;;
              *)       echo "[priority] Failed to probe social queue: $PROBE"; exit 1 ;;
            esac
          else
            echo "social_has_pending=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan for new content
        if: steps.priority.outputs.skip_run != 'true'
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node src/scan-new-content.js

      - name: Sync content to Micro.blog and update About page
        if: steps.priority.outputs.skip_run != 'true' && ((steps.priority.outputs.career_first == '1' && env.TWO_POSTS_PER_DAY != 'true') || steps.priority.outputs.social_has_pending == 'false' || (steps.priority.outputs.is_morning_slot == 'false' && env.TWO_POSTS_PER_DAY == 'true'))
        env:
          DRY_RUN: 'false'  # Explicitly disable dry-run mode for production
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MICROBLOG_APP_TOKEN: ${{ secrets.MICROBLOG_APP_TOKEN }}
          MICROBLOG_XMLRPC_TOKEN: ${{ secrets.MICROBLOG_XMLRPC_TOKEN }}
          MICROBLOG_USERNAME: ${{ secrets.MICROBLOG_USERNAME }}
        run: node src/sync-content.js

      - name: Read credentials from GSM
        if: steps.priority.outputs.skip_run != 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_JSON" > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json --quiet
          LINKEDIN_ACCESS_TOKEN=$(gcloud secrets versions access latest --secret=linkedin_access_token --project=demoo-ooclock)
          LINKEDIN_TOKEN_EXPIRES_AT=$(gcloud secrets versions access latest --secret=linkedin_token_expires_at --project=demoo-ooclock)
          LINKEDIN_PERSON_URN=$(gcloud secrets versions access latest --secret=linkedin_person_urn --project=demoo-ooclock)
          DD_API_KEY=$(gcloud secrets versions access latest --secret=datadog-commit-story-dev --project=demoo-ooclock 2>/dev/null) || true
          echo "::add-mask::$LINKEDIN_ACCESS_TOKEN"
          echo "::add-mask::$LINKEDIN_TOKEN_EXPIRES_AT"
          echo "::add-mask::$LINKEDIN_PERSON_URN"
          if [ -n "$DD_API_KEY" ]; then echo "::add-mask::$DD_API_KEY"; else echo "[daily-sync] Warning: DD_API_KEY unavailable; token-expiry metric will be skipped"; fi
          echo "LINKEDIN_ACCESS_TOKEN=$LINKEDIN_ACCESS_TOKEN" >> "$GITHUB_ENV"
          echo "LINKEDIN_TOKEN_EXPIRES_AT=$LINKEDIN_TOKEN_EXPIRES_AT" >> "$GITHUB_ENV"
          echo "LINKEDIN_PERSON_URN=$LINKEDIN_PERSON_URN" >> "$GITHUB_ENV"
          echo "DD_API_KEY=$DD_API_KEY" >> "$GITHUB_ENV"
          rm /tmp/sa-key.json

      - name: Emit LinkedIn token expiry metric
        if: steps.priority.outputs.skip_run != 'true'
        run: node -e "const { checkTokenExpiry } = require('./src/post-linkedin'); checkTokenExpiry(process.env.LINKEDIN_TOKEN_EXPIRES_AT).catch(console.error);"

      - name: Post social content
        if: steps.priority.outputs.skip_run != 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE_URL: ${{ secrets.MASTODON_INSTANCE_URL }}
          MICROBLOG_APP_TOKEN: ${{ secrets.MICROBLOG_APP_TOKEN }}
          IS_MORNING_SLOT: ${{ steps.priority.outputs.is_morning_slot }}
        run: node src/post-social-content.js

      - name: Update page visibility
        if: steps.priority.outputs.skip_run != 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          MICROBLOG_XMLRPC_TOKEN: ${{ secrets.MICROBLOG_XMLRPC_TOKEN }}
          MICROBLOG_USERNAME: ${{ secrets.MICROBLOG_USERNAME }}
        run: node src/update-page-visibility.js
